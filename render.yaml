services:
  - type: web
    name: zasupport-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt && python migrate.py
    startCommand: gunicorn main:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zasupportdb
          property: connectionString
      - key: API_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PORT
        value: "8080"
      - key: REDIS_URL
        fromService:
          name: zasupport-redis
          type: redis
          property: connectionURI
      - key: ISP_MONITOR_ENABLED
        value: "true"
      - key: AGENT_AUTH_TOKEN
        sync: false
      - key: FORMBRICKS_WEBHOOK_SECRET
        sync: false

      # SMTP notifications (run ~/bin/za-render-setup.sh to set HC_NOTIFY_SMTP_PASS)
      - key: HC_NOTIFY_SMTP_HOST
        value: "mail.hexonline.co.za"
      - key: HC_NOTIFY_SMTP_PORT
        value: "587"
      - key: HC_NOTIFY_SMTP_USER
        value: "Courtney@zasupport.com"
      - key: HC_NOTIFY_SMTP_PASS
        sync: false
      - key: HC_NOTIFY_EMAIL_TO
        value: "courtney@zasupport.com"

databases:
  - name: zasupportdb
    plan: free
    region: frankfurt
    ipAllowList: []

redis:
  - name: zasupport-redis
    plan: starter
    region: frankfurt
    ipAllowList: []
